<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IIPAF</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }

    .container {
      max-width: 800px;
      margin: 50px auto;
      background: #fff;
      padding: 30px 35px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    h1 {
      margin-bottom: 5px;
      font-weight: 600;
    }

    p.sub {
      color: #6b7280;
      margin-bottom: 25px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      margin-top: 15px;
      display: block;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #6366f1;
      outline: none;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }

    /* ✅ RADIO FIX (PROFESSIONAL ALIGNMENT) */
    .radio-group {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      font-weight: 400;
    }

    .radio-group input[type="radio"] {
      width: 16px;
      height: 16px;
      margin: 0;
      flex-shrink: 0;
    }

    .radio-group span {
      line-height: 1.4;
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .output {
      margin-top: 30px;
      padding: 20px;
      background: #f8fafc;
      border-radius: 12px;
      border: 2px solid #6366f1;
      white-space: pre-wrap;
      display: none;
      min-height: 150px;
    }

    .loading {
      text-align: center;
      color: #6b7280;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>IIPAF</h1>
  <p class="sub">Industry-Immersive Psychological AI Framework</p>

  <label>Full Name</label>
  <input id="name" type="text" placeholder="Enter full name">

  <label>Department</label>
  <select id="department">
    <option>Applied Psychology</option>
    <option>English</option>
    <option>History</option>
    <option>Political Science</option>
    <option>Sociology</option>
    <option>Economics</option>
  </select>

  <label>Stress Induction Scenario</label>

  <div class="radio-group">
    <label>
      <input type="radio" name="scenario" value="Crisis Intake">
      <span>Crisis Intake: Immediate conflict resolution</span>
    </label>

    <label>
      <input type="radio" name="scenario" value="Policy Brief">
      <span>Policy Brief: Defending recommendations</span>
    </label>

    <label>
      <input type="radio" name="scenario" value="Narrative Audit">
      <span>Narrative Audit: Brand/social critique</span>
    </label>

    <label>
      <input type="radio" name="scenario" value="Risk Analyst">
      <span>Risk Analyst: Market prediction</span>
    </label>

    <label>
      <input type="radio" name="scenario" value="Negotiation">
      <span>Negotiation: High-stakes bargaining</span>
    </label>
  </div>

  <label>Mentor Observation</label>
  <textarea id="observation" placeholder="Describe performance or executive presence"></textarea>

  <button onclick="generatePlan()">Generate AI Report</button>

  <div class="output" id="output"></div>
</div>

<script>
async function generatePlan() {
  const scenario = document.querySelector('input[name="scenario"]:checked');

  const data = {
    name: document.getElementById('name').value,
    department: document.getElementById('department').value,
    scenario: scenario ? scenario.value : "Not selected",
    observation: document.getElementById('observation').value
  };

  const output = document.getElementById('output');
  output.style.display = 'block';
  output.innerHTML = "Generating AI report...";

  try {
    const res = await fetch("http://localhost:3000/generate-plan", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    console.log("API RESPONSE:", result);

    if (result.success && result.plan) {
      output.innerHTML = result.plan;
    } else {
      output.innerHTML = "No AI response received";
    }

  } catch (err) {
    console.error(err);
    output.innerHTML = "Error connecting to server";
  }
}
</script>

</body>
</html>
